# ============================================================================
# 用户服务 API 配置
# ============================================================================

Name: user-api
Host: 127.0.0.1
Port: 8001
Timeout: 15000 # API 超时时间(ms)，上传图片场景需要放宽

# 日志配置
Log:
  ServiceName: user-api
  Mode: console
  Encoding: plain
  Level: info

# ==================== JWT 配置（重要：所有 API 服务必须一致）====================
Auth:
  AccessSecret: "kP9vX2mR7qN5zL4tA1wS8yJ3fG6hB0xU" # 必须与 RPC 中的 AccessSecret 一致
  AccessExpire: 7200  # 2小时

# ==================== RPC 服务配置（通过 Etcd 发现）====================
UserRpc:
  Etcd:
    Hosts:
      - 192.168.10.4:2379
    Key: user.rpc
  NonBlock: true
  Timeout: 10000 # 增加到 10秒，适应图片上传
  Middlewares:
    Duration: false # 失败时避免把二进制图片请求体打印到日志

# ==================== Redis 配置 ====================
BizRedis:
  Host: 192.168.10.4:6379
  Type: node
  Pass: "123456"

# ==================== MySQL 配置 ====================
MySQL:
  DataSource: root:123456@tcp(192.168.10.4:3308)/campushub_user?charset=utf8mb4&parseTime=true&loc=Local

# ==================== 链路追踪（可选）====================
Telemetry:
  Name: user-api
  Endpoint: http://192.168.10.4:14268/api/traces
  Sampler: 1.0
  Batcher: jaeger
